[workspace]
resolver = "2"
members = [
    "cartan",
    "cartan-core",
    "cartan-nalgebra",
    "cartan-manifolds",
    "cartan-optim",
    "cartan-geo",
]

[workspace.package]
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
license = "MIT"
repository = "https://github.com/alejandro-soto-franco/cartan"
keywords = ["riemannian", "manifold", "optimization", "geometry", "geodesic"]
categories = ["mathematics", "science", "algorithms"]

[workspace.dependencies]
nalgebra = "0.33"
rand = "0.9"
rand_distr = "0.5"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
approx = "0.5"
