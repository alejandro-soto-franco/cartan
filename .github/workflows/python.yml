name: Python Bindings

on:
  push:
    branches: [main, 'feature/**']
    paths:
      - 'cartan-py/**'
      - 'cartan-core/**'
      - 'cartan-manifolds/**'
      - 'cartan-optim/**'
      - 'cartan-geo/**'
      - 'cartan-dec/**'
      - '.github/workflows/python.yml'
  pull_request:
    paths:
      - 'cartan-py/**'
      - 'cartan-core/**'
      - 'cartan-manifolds/**'
      - 'cartan-optim/**'
      - 'cartan-geo/**'
      - 'cartan-dec/**'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  rust-check:
    name: Rust compile check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "cartan-py -> cartan-py/target"
      - name: Check cartan-py compiles
        run: cd cartan-py && cargo check

  python-tests:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    needs: rust-check
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          key: py-${{ matrix.python-version }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install maturin
        run: pip install maturin

      - name: Build wheel (abi3)
        run: |
          cd cartan-py
          maturin build --release --out dist
        env:
          PYO3_CROSS_PYTHON_VERSION: '3.9'

      - name: Install wheel
        run: pip install cartan-py/dist/cartan_py-*.whl

      - name: Install test dependencies
        run: pip install pytest hypothesis scipy

      - name: Verify import
        run: python -c "import cartan; print(f'cartan {cartan.__version__} loaded')"

      - name: Run pytest
        run: |
          cd cartan-py
          pytest tests/ -v --tb=short -x --hypothesis-profile=ci
        env:
          HYPOTHESIS_SEED: 0

  wheel-smoke:
    name: Wheel smoke test
    runs-on: ubuntu-latest
    needs: python-tests
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build and install in clean venv
        run: |
          pip install maturin
          cd cartan-py && maturin build --release --out dist
          python -m venv /tmp/smoke-venv
          /tmp/smoke-venv/bin/pip install dist/cartan_py-*.whl numpy scipy
          /tmp/smoke-venv/bin/python -c "
          import cartan
          import numpy as np
          m = cartan.Sphere(2)
          p = m.random_point(seed=42)
          q = m.random_point(seed=43)
          d = m.dist(p, q)
          print(f'dist(p, q) = {d:.6f}')
          assert d > 0
          print('Smoke test passed')
          "
