name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.89
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Test workspace (default features)
        run: cargo test --workspace
      - name: Test cartan-homog with all features
        run: cargo test -p cartan-homog --features full-field,stochastic
      - name: Test cartan-homog-valid with all features
        run: cargo test -p cartan-homog-valid --features full-field,stochastic
      - name: Clippy (default features)
        run: cargo clippy --workspace -- -D warnings
      # The gpu-fft feature pulls gpufft's Vulkan backend, which needs GPU/Vulkan
      # system libraries a runner lacks, so CI lints the substantive features
      # without it (the GPU path needs real hardware to exercise anyway).
      - name: Clippy (cartan-homog full features)
        run: cargo clippy -p cartan-homog --features full-field,stochastic -- -D warnings
      - name: Clippy (cartan-homog-valid full features)
        run: cargo clippy -p cartan-homog-valid --features full-field,stochastic -- -D warnings

  no-std-check:
    name: no_std + alloc build check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.89
      - uses: Swatinem/rust-cache@v2
      - name: Build cartan-core (bare no_std)
        run: cargo build -p cartan-core --no-default-features
      - name: Build cartan-manifolds (no_std + alloc)
        run: cargo build -p cartan-manifolds --no-default-features --features alloc
      - name: Build cartan-geo (no_std + alloc)
        run: cargo build -p cartan-geo --no-default-features --features alloc
