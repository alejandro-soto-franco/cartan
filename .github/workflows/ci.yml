name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85
        with:
          components: clippy
      - run: cargo test --workspace --exclude cartan-py
      - run: cargo clippy --workspace --exclude cartan-py -- -D warnings

  no-std-check:
    name: no_std + alloc build check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85
      - name: Build cartan-core (bare no_std)
        run: cargo build -p cartan-core --no-default-features
      - name: Build cartan-manifolds (no_std + alloc)
        run: cargo build -p cartan-manifolds --no-default-features --features alloc
      - name: Build cartan-geo (no_std + alloc)
        run: cargo build -p cartan-geo --no-default-features --features alloc
