name: Publish cartan-py to PyPI

on:
  push:
    tags: ['cartan-py-v*']

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build-wheels:
    name: Build wheels
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release -m cartan-py/Cargo.toml --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels
          path: dist/

  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: -m cartan-py/Cargo.toml --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true
      - uses: PyO3/maturin-action@v1
        with:
          command: upload
          args: --skip-existing dist/*
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
