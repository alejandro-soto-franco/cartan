name: Publish crates to crates.io

# Triggered by a workspace release tag (for example v0.6.0) or run by hand.
# Publishes every workspace member in dependency order. Crates whose current
# version is already on crates.io are skipped, so re-running a release or
# bumping only a subset of crates is safe.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    environment: crates-io
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@1.89
      - uses: Swatinem/rust-cache@v2

      - name: Publish workspace crates in dependency order
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${CARGO_REGISTRY_TOKEN:-}" ]; then
            echo "CARGO_REGISTRY_TOKEN secret is not set, nothing to publish."
            echo "Add the token under Settings > Secrets to enable crates.io publishing."
            exit 0
          fi

          # Dependency-ordered: a crate appears only after every path
          # dependency (and dev-dependency) it relies on. cartan-io precedes
          # cartan-maxwell because maxwell carries a dev-dependency on it.
          # The FEEC layer is no longer published from here: it comes from the
          # upstream formoniq crates, which cartan-io and cartan-maxwell
          # consume as ordinary registry dependencies.
          crates="cartan-core cartan-manifolds cartan-stochastic \
                  cartan-optim cartan-geo cartan-dec \
                  cartan-remesh cartan-homog cartan-io cartan-maxwell cartan"

          for crate in $crates; do
            echo "::group::publish $crate"
            if cargo publish -p "$crate" 2>&1 | tee /tmp/publish.log; then
              echo "$crate published."
            elif grep -qiE "already (exists|uploaded)|crate version .* is already" /tmp/publish.log; then
              echo "$crate version already on crates.io, skipping."
            else
              echo "$crate publish failed for a reason other than a duplicate version." >&2
              exit 1
            fi
            echo "::endgroup::"
          done
