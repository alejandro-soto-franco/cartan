name: Publish crates to crates.io

# Triggered by a workspace release tag (for example v0.7.0) or run by hand.
# Publishes every publishable workspace member in dependency order. Crates
# whose current version is already on crates.io are skipped, so re-running a
# release or bumping only a subset of crates is safe.
#
# The job fails loudly rather than quietly doing nothing. A release that
# publishes zero crates is a failed release, not a successful no-op, so the
# preflight checks and the final tally all treat "nothing happened" as an
# error.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    environment: crates-io
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@1.89
      - uses: Swatinem/rust-cache@v2

      # Dependency-ordered: a crate appears only after every path dependency
      # (and dev-dependency) it relies on. cartan-io precedes cartan-maxwell
      # because maxwell carries a dev-dependency on it. cartan-gpu leads: it
      # depends on no other workspace crate, only on wgpu and the published
      # gpufft. The FEEC layer is not
      # published from here; it comes from the upstream formoniq crates, which
      # cartan-io and cartan-maxwell consume as ordinary registry dependencies.
      - name: Release order
        id: order
        run: |
          set -euo pipefail
          {
            echo 'crates<<EOF'
            cat <<'ORDER'
          cartan-gpu
          cartan-core
          cartan-manifolds
          cartan-stochastic
          cartan-optim
          cartan-geo
          cartan-dec
          cartan-remesh
          cartan-homog
          cartan-io
          cartan-maxwell
          cartan
          ORDER
            echo EOF
          } >> "$GITHUB_OUTPUT"

      # Guards the failure mode that shipped a stale list once already: crates
      # deleted from the workspace lingered here, and a crate added to the
      # workspace but forgotten here would never be published, silently.
      - name: Preflight - release list matches the workspace
        run: |
          set -euo pipefail
          # publish is null for a publishable package, [] for `publish = false`.
          cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.publish == null) | .name' \
            | sort > /tmp/workspace-publishable.txt
          printf '%s\n' "${{ steps.order.outputs.crates }}" | sed '/^$/d' | sort > /tmp/release-list.txt

          if ! diff -u /tmp/workspace-publishable.txt /tmp/release-list.txt > /tmp/list-diff.txt; then
            echo "The release order does not match the workspace's publishable members." >&2
            echo "Lines with '-' are publishable but missing from the release order (they would never ship)." >&2
            echo "Lines with '+' are in the release order but not publishable (they would abort the run)." >&2
            echo >&2
            cat /tmp/list-diff.txt >&2
            exit 1
          fi
          echo "Release order covers all $(wc -l < /tmp/release-list.txt) publishable members."

      # Catches a tag that disagrees with Cargo.toml. Without this, tagging
      # v0.8.0 while the manifests still say 0.7.0 marks every crate as already
      # published, skips them all, and reports success having released nothing.
      - name: Preflight - tag matches a crate version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail
          tag="${GITHUB_REF#refs/tags/v}"
          versions=$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.publish == null) | "\(.name) \(.version)"')

          if ! echo "$versions" | awk '{print $2}' | grep -qx "$tag"; then
            echo "Tag v$tag matches no publishable crate version, so this release would publish nothing." >&2
            echo "Bump the manifests to $tag, or retag to match what is in the tree:" >&2
            echo "$versions" | sed 's/^/  /' >&2
            exit 1
          fi
          echo "Tag v$tag matches at least one crate version."

      # A tag can point at any commit, including one that never went through
      # CI on main. cargo publish's own verification builds each crate but does
      # not run the test suite.
      - name: Test workspace before publishing
        run: cargo test --workspace

      - name: Check the registry token is present
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${CARGO_REGISTRY_TOKEN:-}" ]; then
            echo "CARGO_REGISTRY_TOKEN is not set, so nothing can be published." >&2
            echo "Add it as a secret on the 'crates-io' environment:" >&2
            echo "  Settings > Environments > crates-io > Add environment secret" >&2
            echo "Get a token from https://crates.io/settings/tokens with the publish-update scope." >&2
            exit 1
          fi
          echo "Token present."

      - name: Publish workspace crates in dependency order
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail

          published=0
          skipped=0
          summary=""

          while read -r crate; do
            [ -n "$crate" ] || continue
            echo "::group::publish $crate"
            if cargo publish -p "$crate" 2>&1 | tee /tmp/publish.log; then
              echo "$crate published."
              published=$((published + 1))
              summary="${summary}| \`${crate}\` | published |"$'\n'
            elif grep -qiE "already (exists|uploaded)|crate version .* is already" /tmp/publish.log; then
              echo "$crate version already on crates.io, skipping."
              skipped=$((skipped + 1))
              summary="${summary}| \`${crate}\` | already on crates.io |"$'\n'
            else
              echo "::endgroup::"
              echo "$crate publish failed for a reason other than a duplicate version." >&2
              exit 1
            fi
            echo "::endgroup::"
          done <<< "${{ steps.order.outputs.crates }}"

          {
            echo "## crates.io release"
            echo
            echo "| crate | outcome |"
            echo "|---|---|"
            printf '%s' "$summary"
            echo
            echo "**$published published, $skipped already present.**"
          } >> "$GITHUB_STEP_SUMMARY"

          # Every crate already being present means the version was never
          # bumped. That is a no-op release, and it should not look green.
          if [ "$published" -eq 0 ]; then
            echo "Every crate was already on crates.io, so this release published nothing." >&2
            echo "Bump the workspace version before tagging." >&2
            exit 1
          fi

          echo "Published $published crate(s), skipped $skipped already present."
